name: P2P Messenger Build & Test

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          python -m py_compile cli.py
          python -m py_compile hermes_p2p/*.py 2>/dev/null || true

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-p2p-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-p2p-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run integration tests
        run: |
          python3 -c 'from hermes_p2p.identity import Identity; from hermes_p2p.message import HermesMessage; from hermes_p2p.node import HermesNode; print("All modules import OK")'
          echo "Module import check passed"
